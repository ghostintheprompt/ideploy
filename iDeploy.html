<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iDeploy Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
  :root { --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a; --accent: #00ff88; --text: #e0e0e0; --muted: #555; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; max-width: 400px; margin: 0 auto; border: 1px solid var(--border); min-height: 100vh; }
  .header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .section { padding: 16px; border-bottom: 1px solid var(--border); }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .slot-card { background: var(--surface); border: 1px solid var(--border); padding: 12px; cursor: pointer; text-align: center; }
  .slot-card.active { border-color: var(--accent); color: var(--accent); }
  .log-area { background: #000; height: 150px; overflow-y: auto; font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 8px; color: #888; }
</style>
</head>
<body>
<div class="header"><div>iDeploy<b>.hub</b></div><div style="width:8px;height:8px;background:var(--accent);border-radius:50%"></div></div>
<div class="section">
  <div class="section-label">Rapid Variant Testing (s3)</div>
  <div class="slot-grid">
    <div class="slot-card active" onclick="switchSlot('A')">Slot A</div>
    <div class="slot-card" onclick="switchSlot('B')">Slot B</div>
  </div>
  <div id="preview" style="margin-top:8px;height:100px;background:#000;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px">[ Preview: Slot A ]</div>
</div>
<div class="section">
  <div class="section-label">System Activity</div>
  <div id="logs" class="log-area"></div>
</div>
<div class="section">
  <div class="section-label">Live Feedback (INC-1)</div>
  <div id="feedback" class="log-area"></div>
</div>
<script src="/lib/live-reload.js"></script>
<script>
  function log(msg) {
    const el = document.getElementById('logs');
    const line = document.createElement('div');
    line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    el.appendChild(line); el.scrollTop = el.scrollHeight;
  }
  function switchSlot(s) {
    document.querySelectorAll('.slot-card').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('preview').textContent = '[ Preview: Slot ' + s + ' ]';
    log('Switched to Slot ' + s);
  }
  
  async function refreshFeedback() {
    const res = await fetch('/feedback-list');
    const files = await res.json();
    const container = document.getElementById('feedback');
    container.innerHTML = '';
    files.sort().reverse().forEach(f => {
      const line = document.createElement('div');
      line.style.marginBottom = '4px';
      const link = document.createElement('a');
      link.href = '/feedback/' + f;
      link.target = '_blank';
      link.textContent = f;
      link.style.color = '#00ff88';
      line.appendChild(link);
      container.appendChild(line);
    });
  }
  setInterval(refreshFeedback, 5000);
  refreshFeedback();
  log('Hub initialized');
</script>
</body>
</html>
