<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iDeploy Hub</title>
<link rel="icon" type="image/png" href="/icon.png">
<meta property="og:image" content="/icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');


  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #00ff88;
    --accent-dim: rgba(0,255,136,0.12);
    --warn: #ff6b35;
    --warn-dim: rgba(255,107,53,0.12);
    --muted: #555;
    --text: #e0e0e0;
    --text-dim: #888;
    --red: #ff4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', monospace;
    font-size: 13px;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text-dim); font-weight: 400; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Sections */
  .section {
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Log Area */
  .log-area {
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 10px;
    height: 120px;
    overflow-y: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Footer */
  .footer {
    padding: 16px;
    text-align: center;
  }

  .footer-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    color: var(--accent);
    border-color: var(--accent);
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">iDeploy<span>.hub</span></div>
  <div id="headerDot" class="status-dot"></div>
</div>

<!-- SYSTEM LOG -->
<div class="section">
  <div class="section-label">System Activity</div>
  <div class="log-area" id="logArea"></div>
</div>

<div class="footer">
  <span class="footer-text">iDeploy v2.0 · Live Iteration Mode</span>
</div>

<!-- Inject Live Reload & Feedback Script -->
<script src="/lib/live-reload.js"></script>

<script>
  function log(msg, type = '') {
    const area = document.getElementById('logArea');
    const line = document.createElement('div');
    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
    line.textContent = `${time}  ${msg}`;
    area.appendChild(line);
    area.scrollTop = area.scrollHeight;
  }

  // Handle reload signal from live-reload.js if needed
  window.addEventListener('message', (e) => {
    if (e.data === 'reload') log('New build detected! Reloading...', 'ok');
  });

  log('iDeploy Hub initialized');
  log('WebSocket connected to build server');
</script>
</body>
</html>
